version: '3.8'
services:
  node_backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: node_backend
    container_name: node_backend
    restart: unless-stopped
    tty: true
    ports:
      - "127.0.0.1:${APP_PORT:-3800}:3000"
    volumes:
      - ./:/usr/src/app
    networks:
      - app-network
      - shared-network # Connect to shared-network for external communication
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    entrypoint:
      - /bin/bash
      - -c
      - |
        cp /etc/mongodb.key /tmp/mongodb.key
        chmod 400 /tmp/mongodb.key
        chown 999:999 /tmp/mongodb.key
        exec mongod --replSet rs0 --bind_ip_all --keyFile /tmp/mongodb.key
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongodb.key:/etc/mongodb.key
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=secret
      - MONGO_INITDB_DATABASE=app_db
    healthcheck:
      test: |
        mongosh --quiet --username root --password secret --authenticationDatabase admin --eval '
        try {
          rs.status().ok
        } catch (e) {
          rs.initiate({
            _id: "rs0",
            members: [{ _id: 0, host: "localhost:27017" }]
          }).ok
        }'
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app-network
  mongo-express:
    image: mongo-express
    container_name: mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      # 1. Use the FULL connection string for Replica Sets
      - ME_CONFIG_MONGODB_URL=mongodb://root:secret@mongodb:27017/?authSource=admin&replicaSet=rs0&directConnection=true
      # 2. Add these to ensure it handles the admin DB correctly
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_MONGODB_ADMINUSERNAME=root
      - ME_CONFIG_MONGODB_ADMINPASSWORD=secret
      # 3. Optional: Basic auth for the web UI (user: admin, pass: pass)
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=pass
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mongo_data:
  mysql_data:
networks:
  app-network:
    driver: bridge # Internal network for communication within the Docker Compose project
  shared-network:
    external: true # External network to communicate with services outside the Docker Compose project
