version: '3.8'
services:
  node_backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: node_backend
    container_name: node_backend
    restart: unless-stopped
    tty: true
    ports:
      - "127.0.0.1:${APP_PORT:-3800}:3000"
    volumes:
      - ./:/usr/src/app
    networks:
      - app-network
      - shared-network # Connect to shared-network for external communication
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=secret
    networks:
      - app-network
  mongo-express:
    image: mongo-express
    container_name: mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://root:secret@mongodb:27017/?authSource=admin
    depends_on:
      - mongodb
    networks:
      - app-network

volumes:
  mongo_data:
networks:
  app-network:
    driver: bridge # Internal network for communication within the Docker Compose project
  shared-network:
    external: true # External network to communicate with services outside the Docker Compose project
